name: Docker Build & Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # Exposes DOCKER_METADATA_OUTPUT_* env vars used by the build step.
      # Produces tags:
      #   ghcr.io/<owner>/secureflow:latest
      #   ghcr.io/<owner>/secureflow:<short-sha>  (e.g. abc1234)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/secureflow
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry using the auto-provisioned
      # GITHUB_TOKEN — no manual secret required.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Layer cache is stored in the registry itself (mode=max captures every
      # intermediate layer, not just the final stage), so cold builds on a
      # fresh runner still benefit from previously-cached layers.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.owner.outputs.value }}/secureflow:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.owner.outputs.value }}/secureflow:buildcache,mode=max
